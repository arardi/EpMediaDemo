name: Android Debug APK Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, contoh: v1.0.0-debug"
        required: true
        default: "v1.0.0-debug"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-debug-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Prepare APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          APK_PATH=$(find . -path "*/build/outputs/apk/debug/*.apk" -type f | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "Debug APK tidak ditemukan"
            exit 1
          fi

          mkdir -p dist
          APK_NAME="app-debug-${TAG}.apk"
          cp "$APK_PATH" "dist/$APK_NAME"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk_file=dist/$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.tag }}-debug-apk
          path: ${{ steps.apk.outputs.apk_file }}

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.apk.outputs.tag }}
          APK_FILE: ${{ steps.apk.outputs.apk_file }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_FILE" --clobber
          else
            gh release create "$TAG" "$APK_FILE" \
              --title "$TAG" \
              --notes "Debug APK otomatis dari GitHub Actions" \
              --target "$GITHUB_SHA" \
              --prerelease
          fi
